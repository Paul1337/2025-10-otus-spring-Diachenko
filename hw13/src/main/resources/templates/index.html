<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Библиотека книг</title>

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 520px;
            margin: 80px auto;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
            padding: 32px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 32px;
        }

        h2 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .nav-link {
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 8px;
            background-color: #f2f2f2;
            color: #333;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background-color 0.15s ease, transform 0.05s ease;
        }

        .nav-link:hover {
            background-color: #e8e8e8;
        }

        .nav-link span {
            font-size: 18px;
        }

        .form-logout {
            display: flex;
            justify-content: center;
        }

        .form-logout button {
            margin-top: 15px;
            cursor: pointer;
            padding: 8px 14px;
            font-size: 14px;
            border-radius: 6px;
            border: none;
            background-color: #222;
            color: #fff;
        }

    </style>
</head>

<body>
<div class="container">

    <h1>Библиотека книг</h1>

    <h2 th:text="'Пользователь: ' + ${#authentication.principal.username}"></h2>

    <nav class="nav">
        <a th:href="@{/books}" class="nav-link">
            <span>📚 Книги</span>
            <span>→</span>
        </a>

        <a th:href="@{/authors}" class="nav-link">
            <span>✍️ Авторы</span>
            <span>→</span>
        </a>

        <a th:href="@{/genres}" class="nav-link">
            <span>🏷 Жанры</span>
            <span>→</span>
        </a>
    </nav>

    <form class="form-logout" action="/logout" method="post">
        <button type="submit">Выйти</button>
    </form>
</div>
</body>
</html>
